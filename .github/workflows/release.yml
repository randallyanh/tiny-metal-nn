# Release workflow: triggered by pushing a tag of the form `v*` (e.g.
# `v0.1.0`). Builds Apple Silicon wheels for Python 3.10–3.13 and
# attaches them to a GitHub Release. PyPI upload is opt-in: the publish
# step is gated by a workflow conditional and a token secret, so it
# stays inactive until a maintainer flips both.
#
# Apple Silicon-only by design — tmnn requires a Metal device, so we do
# not produce x86 / Linux wheels. Users on those platforms should build
# from source.

name: Release

on:
  push:
    tags:
      - "v*"
  # Lets a maintainer trigger a dry-run build (without an actual tag) to
  # smoke-test the workflow.
  workflow_dispatch:

jobs:
  build-wheels:
    name: Build wheel — Python ${{ matrix.python-version }}
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Bootstrap vcpkg
        run: |
          git clone --depth=1 https://github.com/microsoft/vcpkg.git "$HOME/vcpkg"
          "$HOME/vcpkg/bootstrap-vcpkg.sh" -disableMetrics
          echo "VCPKG_ROOT=$HOME/vcpkg" >> "$GITHUB_ENV"

      - name: Install build tooling
        run: pip install build scikit-build-core pybind11

      - name: Build wheel
        run: python -m build --wheel

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheels-py${{ matrix.python-version }}
          path: dist/*.whl
          if-no-files-found: error

  attach-to-release:
    name: Attach wheels to GitHub Release
    needs: build-wheels
    runs-on: macos-14
    # Only on actual tag pushes — workflow_dispatch runs build but skip
    # release creation.
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Inspect artifacts
        run: ls -la dist/

      - name: Create / update GitHub Release with wheels
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.whl

  # ── PyPI publishing — opt-in, off by default ─────────────────────────
  #
  # To enable PyPI publishing on tag releases:
  #   1. Create the `tiny-metal-nn` project on PyPI (or test.pypi.org first).
  #   2. Configure trusted publishing for this repo on PyPI:
  #      https://docs.pypi.org/trusted-publishers/
  #      (preferred over an API token: short-lived OIDC credentials.)
  #   3. Replace `if: false` below with `if: startsWith(github.ref, 'refs/tags/v')`.
  #
  # Until step 3 happens this job is inert — the workflow lints and runs,
  # but uploads nothing.
  publish-pypi:
    name: Publish to PyPI (off by default)
    needs: build-wheels
    runs-on: macos-14
    if: false  # ← flip to startsWith(github.ref, 'refs/tags/v') when ready
    permissions:
      id-token: write  # required for PyPI trusted publishing
    steps:
      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
